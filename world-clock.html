<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球时间 & 天气</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e1a;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --surface-active: rgba(79,142,247,0.12);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --border-accent: rgba(79,142,247,0.5);
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent: #4f8ef7;
  --mono: 'Space Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 12%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 68%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 8%  82%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 58%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 45%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 68% 88%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 18%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(2px 2px at 82% 32%, rgba(255,255,255,.15) 0%, transparent 100%),
    radial-gradient(2px 2px at 42% 92%, rgba(255,255,255,.15) 0%, transparent 100%);
}

/* header */
header {
  position: relative; z-index: 10;
  padding: 1.5rem 2rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 0 0 rgba(79,142,247,.4)}
  50%{opacity:.8;transform:scale(1.1);box-shadow:0 0 0 6px rgba(79,142,247,0)}
}
.logo-text { font-size: 15px; font-weight: 500; letter-spacing: .05em; }
.logo-text span { color: var(--accent); }
.header-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.header-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align:right; line-height:1.8; }
#addBtn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface-active); border: 1px solid var(--border-accent);
  color: var(--accent); border-radius: 10px;
  padding: 7px 14px; font-size: 13px; font-family: var(--sans);
  cursor: pointer; transition: background .15s;
}
#addBtn:hover { background: rgba(79,142,247,.2); }
#addBtn svg { flex-shrink:0; }

/* tz arc */
.tz-arc-wrap {
  position: relative; z-index: 10; padding: 1rem 2rem 0; overflow: hidden;
}
.tz-arc-inner { display:flex; gap:3px; align-items:flex-end; height:32px; }
.tz-bar {
  flex:1; border-radius:2px 2px 0 0; opacity:.4;
  transition: opacity .4s, height .4s; min-width:0;
}
.tz-bar.active { opacity:1; }
.tz-label-row {
  display:flex; justify-content:space-between;
  padding-top:5px; font-family:var(--mono); font-size:10px; color:var(--muted);
}

/* main grid */
main {
  position: relative; z-index: 10;
  padding: 1.5rem 2rem 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 12px;
}

/* card */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 1.1rem 1.2rem;
  transition: background .2s, border-color .2s, transform .2s;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  position: relative;
}
.card:hover { background: var(--surface-hover); border-color: var(--border-hover); transform: translateY(-2px); }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
.card-flag { font-size:20px; line-height:1; }
.card-info { flex:1; margin-left:10px; }
.card-name { font-size:14px; font-weight:500; color:var(--text); }
.card-region { font-size:11px; color:var(--muted); margin-top:2px; }
.card-badge {
  font-size:10px; font-weight:500; letter-spacing:.04em;
  padding:3px 8px; border-radius:20px; white-space:nowrap; align-self:flex-start;
}
.card-remove {
  position:absolute; top:10px; right:10px;
  width:22px; height:22px; border-radius:50%; border:none;
  background: rgba(255,255,255,.06); color: var(--muted);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0; transition:opacity .15s, background .15s;
  font-size:14px; line-height:1;
}
.card:hover .card-remove { opacity:1; }
.card-remove:hover { background:rgba(239,68,68,.25); color:#f87171; }
.card-time { font-family:var(--mono); font-size:30px; font-weight:700; color:var(--text); letter-spacing:-1px; line-height:1; }
.card-seconds { font-size:17px; font-weight:400; opacity:.4; }
.card-date { font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:.03em; }
.card-divider { border:none; border-top:1px solid var(--border); margin:12px 0; }
.card-weather { display:flex; align-items:center; gap:10px; }
.weather-emoji { font-size:20px; }
.weather-right { flex:1; }
.weather-temp { font-family:var(--mono); font-size:19px; font-weight:700; color:var(--text); }
.weather-desc { font-size:11px; color:var(--muted); margin-top:2px; }
.weather-extra { text-align:right; font-size:11px; color:var(--muted); line-height:1.8; }
.weather-loading { font-size:11px; color:var(--muted); font-style:italic; }

.badge-hot   { background:rgba(249,115,22,.15); color:#fb923c; border:1px solid rgba(249,115,22,.25); }
.badge-humid { background:rgba(168,85,247,.15);  color:#c084fc; border:1px solid rgba(168,85,247,.25); }
.badge-warm  { background:rgba(234,179,8,.15);   color:#fbbf24; border:1px solid rgba(234,179,8,.25); }
.badge-cool  { background:rgba(56,189,248,.15);  color:#7dd3fc; border:1px solid rgba(56,189,248,.25); }
.badge-nice  { background:rgba(34,197,94,.15);   color:#4ade80; border:1px solid rgba(34,197,94,.25); }

/* empty state */
#emptyState {
  grid-column: 1/-1;
  text-align:center; padding:4rem 2rem; color:var(--muted);
  display:none;
}
#emptyState p { margin-top:.5rem; font-size:13px; }

/* modal overlay */
.modal-overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  padding:1rem;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:#111827; border:1px solid var(--border-hover);
  border-radius:20px; width:100%; max-width:560px;
  max-height:85vh; overflow:hidden;
  display:flex; flex-direction:column;
  transform:translateY(16px); transition:transform .2s;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-header {
  padding:1.25rem 1.5rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-header h2 { font-size:16px; font-weight:500; }
.modal-close {
  width:30px; height:30px; border-radius:8px; border:none;
  background:var(--surface); color:var(--muted);
  cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
  transition:background .15s;
}
.modal-close:hover { background:var(--surface-hover); color:var(--text); }

.modal-search-wrap { padding:1rem 1.5rem; border-bottom:1px solid var(--border); }
#citySearch {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:9px 14px;
  color:var(--text); font-family:var(--sans); font-size:14px;
  outline:none; transition:border-color .15s;
}
#citySearch::placeholder { color:var(--muted); }
#citySearch:focus { border-color:var(--border-accent); }

.modal-regions {
  display:flex; gap:8px; flex-wrap:wrap; padding:1rem 1.5rem .5rem;
}
.region-tab {
  font-size:12px; padding:4px 12px; border-radius:20px;
  border:1px solid var(--border); background:transparent;
  color:var(--muted); cursor:pointer; font-family:var(--sans);
  transition:all .15s;
}
.region-tab:hover { border-color:var(--border-hover); color:var(--text); }
.region-tab.active { background:var(--surface-active); border-color:var(--border-accent); color:var(--accent); }

.modal-list {
  overflow-y:auto; padding:.5rem 1rem 1.5rem;
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
}
.modal-list::-webkit-scrollbar { width:5px; }
.modal-list::-webkit-scrollbar-track { background:transparent; }
.modal-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:3px; }

.city-option {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:10px;
  border:1px solid var(--border);
  cursor:pointer; transition:all .15s;
  background:var(--surface);
}
.city-option:hover { background:var(--surface-hover); border-color:var(--border-hover); }
.city-option.added { background:var(--surface-active); border-color:var(--border-accent); }
.city-option.added .opt-check { display:flex; }
.city-option.added .opt-add { display:none; }
.opt-flag { font-size:18px; flex-shrink:0; }
.opt-info { flex:1; min-width:0; }
.opt-name { font-size:13px; font-weight:500; color:var(--text); }
.opt-region { font-size:11px; color:var(--muted); }
.opt-check {
  width:20px; height:20px; border-radius:50%;
  background:rgba(34,197,94,.2); color:#4ade80;
  display:none; align-items:center; justify-content:center;
  font-size:11px; flex-shrink:0;
}
.opt-add {
  width:20px; height:20px; border-radius:50%;
  background:rgba(79,142,247,.15); color:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; flex-shrink:0;
}

#noResults { grid-column:1/-1; text-align:center; color:var(--muted); font-size:13px; padding:2rem; display:none; }

footer {
  position:relative; z-index:10;
  text-align:center; padding:1.5rem;
  font-size:11px; color:var(--muted);
  border-top:1px solid var(--border);
  font-family:var(--mono);
}
footer span { color:var(--accent); }
.blink { display:inline-block; width:6px; height:6px; border-radius:50%; background:#22c55e; margin-right:6px; animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

@media(max-width:600px){
  header,main,.tz-arc-wrap{padding-left:1rem;padding-right:1rem}
  .modal-list{grid-template-columns:1fr}
  .card-time{font-size:26px}
}
@media(prefers-reduced-motion:reduce){ .card,.logo-dot,.blink{animation:none;transition:none} }
</style>
</head>

</main>

<footer>

</footer>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="选择城市">

    <div class="modal-list" id="cityList">
      <div id="noResults">没有找到匹配的城市</div>
    </div>
  </div>
</div>

const AREAS = ["全部","东亚","东南亚","南亚","中东","欧洲","非洲","北美","中美洲","南美","大洋洲"];
const WMO_MAP = {
  0:{icon:"☀️",desc:"晴"},1:{icon:"🌤️",desc:"多云转晴"},2:{icon:"⛅",desc:"多云"},3:{icon:"☁️",desc:"阴"},
  45:{icon:"🌫️",desc:"雾"},48:{icon:"🌫️",desc:"雾凇"},51:{icon:"🌦️",desc:"毛毛雨"},
  61:{icon:"🌧️",desc:"小雨"},63:{icon:"🌧️",desc:"中雨"},65:{icon:"🌧️",desc:"大雨"},
  71:{icon:"🌨️",desc:"小雪"},73:{icon:"❄️",desc:"中雪"},75:{icon:"❄️",desc:"大雪"},
  80:{icon:"🌦️",desc:"阵雨"},95:{icon:"⛈️",desc:"雷雨"},99:{icon:"⛈️",desc:"强雷雨"},
};
const ARC_COLORS = ["#4f8ef7","#7c6af5","#22c55e","#38bdf8","#f97316","#eab308"];

const DAY_CN  = ["周日","周一","周二","周三","周四","周五","周六"];
const MON_CN  = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

// ── state ──────────────────────────────────────────────────────────────
let activeCityIds = ["beijing","tokyo","newyork","london","dubai","sydney"];
let weatherCache  = {};
let currentArea   = "全部";
let searchQuery   = "";

// ── utils ───────────────────────────────────────────────────────────────
function getWMO(code) {
  return WMO_MAP[code] || WMO_MAP[Math.floor(code/10)*10] || {icon:"🌡️",desc:"未知"};
}
function getTempBadge(temp) {
  if (temp >= 35) return {cls:"hot",  label:"酷热"};
  if (temp >= 28) return {cls:"humid",label:"闷热"};
  if (temp >= 22) return {cls:"warm", label:"温暖"};
  if (temp >= 14) return {cls:"nice", label:"舒适"};
  return                 {cls:"cool", label:"凉爽"};
}
function getLocalTime(tz) {
  const now = new Date();
  const f = (t,o) => new Intl.DateTimeFormat("en-US",{...o,timeZone:tz}).format(now);
  const h = f("h",{hour:"2-digit",hour12:false});
  const m = f("m",{minute:"2-digit"});
  const s = f("s",{second:"2-digit"});
  const d = new Date(now.toLocaleString("en-US",{timeZone:tz}));
  return {h,m,s,date:`${DAY_CN[d.getDay()]} · ${MON_CN[d.getMonth()]}${d.getDate()}日`};
}

// ── weather ─────────────────────────────────────────────────────────────
async function fetchWeather(city) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&timezone=auto&forecast_days=1`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    const c = d.current;
    const wmo  = getWMO(c.weathercode);
    const temp = Math.round(c.temperature_2m);
    weatherCache[city.id] = {
      temp, icon:wmo.icon, desc:wmo.desc,
      wind:Math.round(c.windspeed_10m),
      humidity:Math.round(c.relativehumidity_2m),
      badge:getTempBadge(temp), ts:Date.now()
    };
  } catch(e) {
    if (!weatherCache[city.id])
      weatherCache[city.id] = {temp:"—",icon:"❓",desc:"无数据",wind:"—",humidity:"—",badge:{cls:"cool",label:"—"},ts:0};
  }
}

async function loadWeatherForActive() {
  const cities = activeCityIds.map(id => ALL_CITIES.find(c=>c.id===id)).filter(Boolean);
  document.getElementById("weatherStatus").textContent = "天气更新中…";
  await Promise.all(cities.map(fetchWeather));
  renderCards();
  const t = new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("weatherStatus").textContent = `上次更新 ${t}`;
}

// ── render cards ─────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById("grid");
  // keep empty state div
  const es = document.getElementById("emptyState");
  grid.innerHTML = "";
  grid.appendChild(es);

  if (activeCityIds.length === 0) {
    es.style.display = "block"; return;
  }
  es.style.display = "none";

  activeCityIds.forEach(id => {
    const city = ALL_CITIES.find(c=>c.id===id);
    if (!city) return;
    const w = weatherCache[id] || {};
    const t = getLocalTime(city.tz);
    const badge = w.badge || {cls:"cool",label:"—"};

    const card = document.createElement("article");
    card.className = "card";
    card.id = "card-"+id;
    card.setAttribute("aria-label",`${city.name} 当前时间 ${t.h}:${t.m}`);
    card.innerHTML = `
      <button class="card-remove" onclick="removeCity('${id}')" aria-label="移除 ${city.name}">✕</button>
      <div class="card-top">
        <div class="card-flag" aria-hidden="true">${city.flag}</div>
        <div class="card-info">
          <div class="card-name">${city.name}</div>
          <div class="card-region">${city.region}</div>
        </div>
        <div class="card-badge badge-${badge.cls}">${badge.label}</div>
      </div>
      <div class="card-time" id="t-${id}">${t.h}:${t.m}<span class="card-seconds">:${t.s}</span></div>
      <div class="card-date" id="d-${id}">${t.date}</div>
      <hr class="card-divider">
      <div class="card-weather">
        <div class="weather-emoji" aria-hidden="true">${w.icon||"…"}</div>
        <div class="weather-right">
          <div class="weather-temp">${w.temp!==undefined?w.temp+"°C":"—"}</div>
          <div class="weather-desc">${w.desc||"加载中…"}</div>
        </div>
        <div class="weather-extra">
          <div>💨 ${w.wind!==undefined?w.wind+" km/h":"—"}</div>
          <div>💧 ${w.humidity!==undefined?w.humidity+"%":"—"}</div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function tickClocks() {
  activeCityIds.forEach(id => {
    const city = ALL_CITIES.find(c=>c.id===id);
    if(!city) return;
    const te = document.getElementById("t-"+id);
    const de = document.getElementById("d-"+id);
    if(!te) return;
    const t = getLocalTime(city.tz);
    te.innerHTML = `${t.h}:${t.m}<span class="card-seconds">:${t.s}</span>`;
    de.textContent = t.date;
  });
  const now = new Date();
  document.getElementById("localTime").textContent =
    now.toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

// ── remove city ──────────────────────────────────────────────────────────
function removeCity(id) {
  activeCityIds = activeCityIds.filter(x=>x!==id);
  renderCards();
  updateModalStates();
}

// ── tz arc ───────────────────────────────────────────────────────────────
function buildArc() {
  const arc = document.getElementById("tzArc");
  for (let i=0;i<24;i++) {
    const bar = document.createElement("div");
    bar.className="tz-bar"; bar.id="tz-"+i;
    bar.style.background = ARC_COLORS[i%ARC_COLORS.length];
    arc.appendChild(bar);
  }
}
function updateArc() {
  const utcH = new Date().getUTCHours();
  for (let i=0;i<24;i++) {
    const bar = document.getElementById("tz-"+i);
    if(!bar) continue;
    const diff=Math.abs(i-utcH), dist=Math.min(diff,24-diff);
    bar.style.height=Math.max(7,32-dist*2.5)+"px";
    bar.classList.toggle("active",dist<=1);
  }
}

// ── modal ────────────────────────────────────────────────────────────────
function buildRegionTabs() {
  const wrap = document.getElementById("regionTabs");
  AREAS.forEach(area => {
    const btn = document.createElement("button");
    btn.className = "region-tab" + (area===currentArea?" active":"");
    btn.textContent = area;
    btn.onclick = () => {
      currentArea = area;
      document.querySelectorAll(".region-tab").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      renderCityList();
    };
    wrap.appendChild(btn);
  });
}

function renderCityList() {
  const list = document.getElementById("cityList");
  const noRes = document.getElementById("noResults");
  // clear except noResults
  Array.from(list.children).forEach(c=>{ if(c.id!=="noResults") c.remove(); });

  const q = searchQuery.toLowerCase();
  const filtered = ALL_CITIES.filter(c => {
    const areaOk = currentArea==="全部" || c.area===currentArea;
    const searchOk = !q || c.name.includes(q) || c.region.includes(q) || c.area.includes(q);
    return areaOk && searchOk;
  });

  noRes.style.display = filtered.length===0?"block":"none";

  filtered.forEach(city => {
    const added = activeCityIds.includes(city.id);
    const el = document.createElement("div");
    el.className = "city-option"+(added?" added":"");
    el.id = "opt-"+city.id;
    el.setAttribute("role","button");
    el.setAttribute("tabindex","0");
    el.setAttribute("aria-pressed", added?"true":"false");
    el.innerHTML = `
      <div class="opt-flag" aria-hidden="true">${city.flag}</div>
      <div class="opt-info">
        <div class="opt-name">${city.name}</div>
        <div class="opt-region">${city.region}</div>
      </div>
      <div class="opt-check" aria-hidden="true">✓</div>
      <div class="opt-add" aria-hidden="true">+</div>`;
    el.onclick = () => toggleCity(city.id);
    el.onkeydown = e => { if(e.key==="Enter"||e.key===" ") toggleCity(city.id); };
    list.appendChild(el);
  });
}

function toggleCity(id) {
  if (activeCityIds.includes(id)) {
    activeCityIds = activeCityIds.filter(x=>x!==id);
  } else {
    activeCityIds.push(id);
    const city = ALL_CITIES.find(c=>c.id===id);
    if (city && !weatherCache[id]) {
      fetchWeather(city).then(renderCards);
    }
  }
  renderCards();
  updateModalStates();
}

function updateModalStates() {
  ALL_CITIES.forEach(city => {
    const el = document.getElementById("opt-"+city.id);
    if(!el) return;
    const added = activeCityIds.includes(city.id);
    el.classList.toggle("added", added);
    el.setAttribute("aria-pressed", added?"true":"false");
  });
}

function filterCities() {
  searchQuery = document.getElementById("citySearch").value;
  renderCityList();
}

function openModal() {
  document.getElementById("modalOverlay").classList.add("open");
  document.getElementById("citySearch").focus();
  renderCityList();
}
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}
document.getElementById("modalOverlay").addEventListener("click",e=>{
  if(e.target===e.currentTarget) closeModal();
});
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

// ── init ─────────────────────────────────────────────────────────────────
buildArc();
buildRegionTabs();
renderCards();
loadWeatherForActive();

setInterval(tickClocks, 1000);
setInterval(updateArc, 30000);
setInterval(loadWeatherForActive, 10*60*1000);

tickClocks();
updateArc();
</script>
